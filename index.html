<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gift Cards</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

/* background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 20%,rgba(59,130,246,.16),transparent 25%),
radial-gradient(circle at 85% 25%,rgba(168,85,247,.12),transparent 25%),
radial-gradient(circle at 50% 85%,rgba(34,197,94,.10),transparent 25%);
z-index:-2;
}

/* HEADER */
.header{text-align:center;padding:34px 15px 20px}
.title{
font-size:34px;
font-weight:800;
background:linear-gradient(90deg,#fff,#60a5fa,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.sub{margin-top:10px;font-size:14px;opacity:.65}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:18px;
max-width:580px;
margin:auto;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:14px;
cursor:pointer;
transition:.25s;
backdrop-filter:blur(12px);
}
.card:hover{transform:translateY(-6px)}

.card img{
width:100%;
height:125px;
object-fit:contain;
background:#fff;
padding:14px;
border-radius:18px;
}

.name{margin-top:12px;font-size:15px;font-weight:800}
.price{margin-top:6px;font-size:13px;opacity:.75}
.tag{margin-top:10px;font-size:11px;opacity:.8}

/* OFFER */
.offerPage{display:none;padding:20px}
.box{
max-width:540px;
margin:auto;
background:rgba(255,255,255,.05);
border-radius:24px;
padding:22px;
}
.selectedImage{
width:100%;
height:190px;
object-fit:contain;
background:#fff;
border-radius:18px;
padding:18px;
}
#selectedTitle{font-size:28px;font-weight:800;margin-top:10px}
.desc{font-size:14px;opacity:.7;margin:10px 0}

/* BUTTONS */
.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin-top:12px;
border-radius:16px;
background:rgba(255,255,255,.04);
}
.option button{
background:linear-gradient(90deg,#22c55e,#16a34a);
border:none;
padding:10px 14px;
color:#fff;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.back{
width:100%;
margin-top:16px;
padding:12px;
border-radius:12px;
background:#1f2937;
color:#fff;
border:none;
cursor:pointer;
}

/* LOCKER MODAL */
.locker{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}
.lockerBox{
background:#111;
padding:25px;
border-radius:18px;
text-align:center;
width:90%;
max-width:360px;
}
.lockerBox h2{margin-bottom:10px}
.lockerBox button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
color:#fff;
font-weight:700;
cursor:pointer;
}

/* footer */
.footer{text-align:center;padding:26px;font-size:12px;opacity:.45}

@media(max-width:480px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="header">
<div class="title">PREMIUM GIFT CARDS</div>
<div class="sub">Select your card and continue</div>
</div>

<div class="grid" id="grid">

<div class="card" onclick="openOffer('ROBLOX $100 CARD', this)">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Roblox_Logo.svg" alt="Roblox">
<div class="name">ROBLOX</div>
<div class="price">$100 Gift Card</div>
<div class="tag">Popular</div>
</div>

<div class="card" onclick="openOffer('PLAYSTATION $50 CARD', this)">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg">
<div class="name">PLAYSTATION</div>
<div class="price">$50 Gift Card</div>
<div class="tag">Top</div>
</div>

<div class="card" onclick="openOffer('AMAZON $50 CARD', this)">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
<div class="name">AMAZON</div>
<div class="price">$50 Gift Card</div>
<div class="tag">Trending</div>
</div>

<div class="card" onclick="openOffer('APPLE $100 CARD', this)">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<div class="name">APPLE</div>
<div class="price">$100 Gift Card</div>
<div class="tag">Premium</div>
</div>

</div>

<!-- OFFER PAGE -->
<div class="offerPage" id="offerPage">
<div class="box">
<img id="selectedImage" class="selectedImage">
<div id="selectedTitle"></div>
<div class="desc">Unlock your access below</div>

<div class="option">
<div>
<strong>Access Option</strong>
<span style="display:block;opacity:.7;font-size:12px">Continue process</span>
</div>
<button onclick="openLocker()">Start</button>
</div>

<button class="back" onclick="backPage()">← Back</button>
</div>
</div>

<!-- LOCKER -->
<div class="locker" id="locker">
<div class="lockerBox">
<h2>Unlocking...</h2>
<p>Please wait a moment</p>
<button onclick="finish()">Continue</button>
</div>
</div>

<div class="footer">© 2026 Premium Gift Cards</div>

<script>
function openOffer(title,el){
document.getElementById("grid").style.display="none";
document.getElementById("offerPage").style.display="block";

document.getElementById("selectedTitle").innerText=title;
document.getElementById("selectedImage").src=el.querySelector("img").src;
}

function backPage(){
document.getElementById("grid").style.display="grid";
document.getElementById("offerPage").style.display="none";
}

function openLocker(){
document.getElementById("locker").style.display="flex";
}

function finish(){
document.getElementById("locker").style.display="none";
alert("Unlocked successfully ✔");
}
</script>

</body>
</html>
